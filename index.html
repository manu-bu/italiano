  function esCulturaValleIt() {
    return esChamonixIt() || esActividadesValleIt();
  }
  function esTerreno() {
    return typeof estado !== 'undefined' && estado.unidad === 'C' && estado.tema === 'C1';
  }
  function esFloraFauna() {
    return typeof estado !== 'undefined' && estado.unidad === 'C' && estado.tema === 'C2';
  }
  function esActividades() {
    return typeof estado !== 'undefined' && estado.unidad === 'C' && estado.tema === 'C4';
  }
  function esClima() {
    return typeof estado !== 'undefined' && estado.unidad === 'C' && estado.tema === 'C3';
  }
  function esVocabulario() {
    return typeof estado !== 'undefined' && estado.unidad === 'H';
  }
  function esImperativo() {
    return typeof estado !== 'undefined' && estado.unidad === 'E' && estado.tema === 'E1';
  }
  function esSubjuntivo() {
    return typeof estado !== 'undefined' && estado.unidad === 'E' && estado.tema === 'E2';
  }
  function esPreguntas() {
    return typeof estado !== 'undefined' && estado.unidad === 'E' && estado.tema === 'E3';
  }
  function esFrases() {
    return typeof estado !== 'undefined' && estado.unidad === 'E' && estado.tema === 'E4';
  }
  function esNegacion() {
    return typeof estado !== 'undefined' && estado.unidad === 'E' && estado.tema === 'E5';
  }
  function esElTiempo() {
    return typeof estado !== 'undefined' && estado.unidad === 'D' && estado.tema === 'D2';
  }
  function esPersonas() {
    return typeof estado !== 'undefined' && estado.unidad === 'F';
  }
  function esNumeros() {
    return typeof estado !== 'undefined' && estado.unidad === 'D' && estado.tema === 'D1';
  }

  function paletaActual() {
    if (typeof estado === 'undefined') return GRISES;
    if (estado.unidad === 'G') return COLORES_VERBOS;
    if (esActividades()) return COLORES_ACTIVIDADES;
    if (esVocabulario()) return COLORES_VOCABULARIO;
    if (esImperativo()) return COLORES_IMPERATIVO;
    if (esSubjuntivo()) return COLORES_SUBJUNTIVO;
    if (esPreguntas()) return COLORES_PREGUNTAS;
    if (esFrases()) return COLORES_FRASES;
    if (esNegacion()) return COLORES_NEGACION;
    if (esElTiempo()) return COLORES_ELTIEMPO;
    if (esPersonas()) return COLORES_PERSONAS;
    return GRISES;
  }

  // El modo determina la forma/comportamiento de la partícula, no solo
  // el color. Cultura usa confeti: rectángulos quietos en su lugar
  // (rotación fija) que aparecen y se desvanecen, en vez de los
  // puntitos con glow que usan las demás unidades — la caída se probó
  // y generaba mareo detrás de las tarjetas, así que se descartó.
  // Geografía y el Clima → Terreno usa agujas de pino, medias y
  // plumitas, con el mismo comportamiento de aparición/desvanecimiento
  // quieto. Actividades usa chispitas: mismo comportamiento quieto,
  // con forma de destello de 4 puntas y un poco de glow. Flora y Fauna
  // usa hoja/flor/huella, mismo comportamiento quieto también. Clima
  // y Estaciones usa su propio mix: florcita rosa, hojita verde
  // (para compensar la paleta), y puntitos simples para el resto
  // (celeste, amarillo casi blanco, y el blanco con más brillo que
  // los demás).
  // Vocabulario usa fichas: cuadraditos blancos con borde de color y
  // una rayita al medio, como fichas de palabras sueltas. Imperativo
  // usa signos "!", a tono con lo estridente del tema. Subjuntivo usa
  // "¡?" (duda + exclamación), a tono con la incertidumbre del modo.
  // Preguntas usa solo "?". Frases usa "..." (tres puntitos). Negación
  // usa una "X". El Tiempo usa un relojito de arena. Números (D1) se
  // queda con la paleta gris de siempre (no tiene tema visual propio)
  // pero cambia la forma a los 4 signos de operaciones: +, −, ×, ÷.
  // Alpi Italiani/Actividades/País usan el mix "campo montañoso": confeti,
  // hojita, granito y circulito, cada uno con su color fijo (ver
  // CULTURA_FR_TIPOS más arriba).
  function modoActual() {
    if (esTerreno()) return 'terreno';
    if (esFloraFauna()) return 'flora-fauna';
    if (esClima()) return 'clima';
    if (esActividades()) return 'chispitas';
    if (esPaisIt()) return 'cultura-italia';
    if (esCulturaValleIt()) return 'cultura-valle';
    if (esVocabulario()) return 'ficha';
    if (esImperativo()) return 'exclamacion';
    if (esSubjuntivo()) return 'interrobang';
    if (esPreguntas()) return 'pregunta';
    if (esFrases()) return 'puntos-suspensivos';
    if (esNegacion()) return 'equis';
    if (esElTiempo()) return 'reloj-arena';
    if (esNumeros()) return 'operaciones';
    return 'circulo';
  }

  // Cantidad al triple de la original (era 10) — mismo mecanismo y
  // mismo tipo de partícula por unidad, solo se ve más poblado.
  const CANTIDAD_OBJETIVO = 30;
  const particulas = [];

  function nuevaParticula() {
    const paleta = paletaActual();
    const modo = modoActual();
    const base = {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      modo,
      vida: 0,
      duracion: 220 + Math.random() * 160
    };
    if (modo === 'cultura-italia') {
      const c = CULTURA_ITALIA_TIPOS[Math.floor(Math.random() * CULTURA_ITALIA_TIPOS.length)];
      base.tipo = c.tipo;
      base.color = c.color;
      base.w = 8 + Math.random() * 6;
      base.h = 5 + Math.random() * 4;
      base.rot = Math.random() * 360;
    } else if (modo === 'cultura-valle') {
      const c = CULTURA_VALLE_TIPOS[Math.floor(Math.random() * CULTURA_VALLE_TIPOS.length)];
      base.tipo = c.tipo;
      base.color = c.color;
      base.w = 8 + Math.random() * 6;
      base.h = 5 + Math.random() * 4;
      base.rot = Math.random() * 360;
    } else if (modo === 'terreno') {
      base.tipo = ['aguja', 'media', 'pluma'][Math.floor(Math.random() * 3)];
      base.rot = Math.random() * 360;
    } else if (modo === 'flora-fauna') {
      base.tipo = ['hoja', 'flor', 'huella'][Math.floor(Math.random() * 3)];
      base.rot = Math.random() * 360;
    } else if (modo === 'clima') {
      const c = CLIMA_TIPOS[Math.floor(Math.random() * CLIMA_TIPOS.length)];
      base.tipo = c.tipo;
      base.color = c.color;
      base.rot = Math.random() * 360;
    } else if (modo === 'chispitas') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 360;
      base.radio = 3.5 + Math.random() * 2.5;
    } else if (modo === 'ficha') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 16 - 8;
    } else if (modo === 'exclamacion') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 24 - 12;
      base.escala = 0.85 + Math.random() * 0.4;
    } else if (modo === 'interrobang') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 20 - 10;
      base.escala = 0.85 + Math.random() * 0.4;
    } else if (modo === 'pregunta') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 20 - 10;
      base.escala = 0.85 + Math.random() * 0.4;
    } else if (modo === 'puntos-suspensivos') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 14 - 7;
      base.escala = 0.85 + Math.random() * 0.4;
    } else if (modo === 'equis') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 30 - 15;
      base.escala = 0.85 + Math.random() * 0.4;
    } else if (modo === 'reloj-arena') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 30 - 15;
      base.escala = 0.85 + Math.random() * 0.4;
    } else if (modo === 'operaciones') {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.rot = Math.random() * 20 - 10;
      base.escala = 0.85 + Math.random() * 0.4;
      base.signo = ['+', '−', '×', '÷'][Math.floor(Math.random() * 4)];
    } else {
      base.color = paleta[Math.floor(Math.random() * paleta.length)];
      base.radio = 2 + Math.random() * 1.5;
    }
    return base;
  }

  for (let i = 0; i < 12; i++) {
    const p = nuevaParticula();
    p.vida = Math.random() * p.duracion;
    particulas.push(p);
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (let i = particulas.length - 1; i >= 0; i--) {
      const p = particulas[i];
      p.vida += 1;
      const t = p.vida / p.duracion;
      if (t >= 1) { particulas.splice(i, 1); continue; }

      const alpha = Math.sin(t * Math.PI);

      if (p.modo === 'cultura-italia' || p.modo === 'cultura-valle') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        if (p.tipo === 'confeti') {
          ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        } else if (p.tipo === 'hoja') {
          ctx.beginPath();
          ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(-7, 0); ctx.lineTo(7, 0);
          ctx.stroke();
        } else if (p.tipo === 'grano') {
          ctx.beginPath();
          ctx.arc(0, 0, 1.8, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.shadowBlur  = 8;
          ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(0, 0, 3.2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else if (p.modo === 'terreno') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.85;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        if (p.tipo === 'aguja') {
          ctx.fillStyle = PINO;
          ctx.beginPath();
          ctx.ellipse(0, 0, 10, 1.6, 0, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.tipo === 'media') {
          ctx.fillStyle = VERDE_BRILLANTE;
          ctx.beginPath();
          ctx.arc(0, 0, 5, 0, Math.PI);
          ctx.fill();
        } else {
          ctx.fillStyle = MARRON_CLARO;
          ctx.beginPath();
          ctx.moveTo(0, -8);
          ctx.quadraticCurveTo(5, -3, 0, 8);
          ctx.quadraticCurveTo(-5, -3, 0, -8);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(0, -7); ctx.lineTo(0, 7);
          ctx.stroke();
        }
        ctx.restore();
      } else if (p.modo === 'flora-fauna') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.85;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        if (p.tipo === 'hoja') {
          ctx.fillStyle = HOJA;
          ctx.beginPath();
          ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(-7, 0); ctx.lineTo(7, 0);
          ctx.stroke();
        } else if (p.tipo === 'flor') {
          ctx.fillStyle = FLOR;
          for (let k = 0; k < 5; k++) {
            const a = (k / 5) * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 3.2, Math.sin(a) * 3.2, 2.6, 1.6, a, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = POLEN;
          ctx.beginPath();
          ctx.arc(0, 0, 1.8, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = TIERRA;
          ctx.beginPath();
          ctx.ellipse(0, 3, 3.4, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          [[-3.5, -4], [-1.2, -5.5], [1.2, -5.5], [3.5, -4]].forEach(([dx, dy]) => {
            ctx.beginPath();
            ctx.ellipse(dx, dy, 1.5, 2, 0, 0, Math.PI * 2);
            ctx.fill();
          });
        }
        ctx.restore();
      } else if (p.modo === 'clima') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.85;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        if (p.tipo === 'flor') {
          ctx.fillStyle = p.color;
          for (let k = 0; k < 5; k++) {
            const a = (k / 5) * Math.PI * 2;
            ctx.beginPath();
            ctx.ellipse(Math.cos(a) * 3.2, Math.sin(a) * 3.2, 2.6, 1.6, a, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(0, 0, 1.6, 0, Math.PI * 2);
          ctx.fill();
        } else if (p.tipo === 'hoja') {
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.ellipse(0, 0, 8, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = 'rgba(255,255,255,0.5)';
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(-7, 0); ctx.lineTo(7, 0);
          ctx.stroke();
        } else {
          const esBlanca = p.color === '#ffffff';
          ctx.shadowBlur  = esBlanca ? 16 : 8;
          ctx.shadowColor = p.color;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(0, 0, esBlanca ? 3.6 : 3, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      } else if (p.modo === 'chispitas') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.95;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.shadowBlur  = 9;
        ctx.shadowColor = p.color;
        ctx.fillStyle = p.color;
        const r = p.radio;
        ctx.beginPath();
        ctx.moveTo(0, -r); ctx.lineTo(r * 0.28, -r * 0.28); ctx.lineTo(r, 0); ctx.lineTo(r * 0.28, r * 0.28);
        ctx.lineTo(0, r); ctx.lineTo(-r * 0.28, r * 0.28); ctx.lineTo(-r, 0); ctx.lineTo(-r * 0.28, -r * 0.28);
        ctx.closePath(); ctx.fill();
        ctx.restore();
      } else if (p.modo === 'ficha') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        const rr = (x, y, w, h, r) => {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        };
        ctx.fillStyle = '#ffffff';
        rr(-7, -7, 14, 14, 3);
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = p.color;
        rr(-7, -7, 14, 14, 3);
        ctx.stroke();
        ctx.fillStyle = p.color;
        ctx.fillRect(-4, -1, 8, 2);
        ctx.restore();
      } else if (p.modo === 'exclamacion') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.scale(p.escala, p.escala);
        ctx.fillStyle = p.color;
        const rrBarra = (x, y, w, h, r) => {
          ctx.beginPath();
          ctx.moveTo(x + r, y);
          ctx.arcTo(x + w, y, x + w, y + h, r);
          ctx.arcTo(x + w, y + h, x, y + h, r);
          ctx.arcTo(x, y + h, x, y, r);
          ctx.arcTo(x, y, x + w, y, r);
          ctx.closePath();
        };
        rrBarra(-2.2, -12, 4.4, 14, 2.2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, 6, 2.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      } else if (p.modo === 'interrobang') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.scale(p.escala, p.escala);
        ctx.fillStyle = p.color;
        ctx.font = '700 15px Quicksand, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('¡?', 0, 0);
        ctx.restore();
      } else if (p.modo === 'pregunta') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.scale(p.escala, p.escala);
        ctx.fillStyle = p.color;
        ctx.font = '700 16px Quicksand, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', 0, 0);
        ctx.restore();
      } else if (p.modo === 'puntos-suspensivos') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.scale(p.escala, p.escala);
        ctx.fillStyle = p.color;
        ctx.font = '700 16px Quicksand, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('...', 0, 0);
        ctx.restore();
      } else if (p.modo === 'equis') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.scale(p.escala, p.escala);
        ctx.fillStyle = p.color;
        ctx.font = '700 17px Quicksand, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('X', 0, 0);
        ctx.restore();
      } else if (p.modo === 'reloj-arena') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.scale(p.escala, p.escala);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.moveTo(-5, -8); ctx.lineTo(5, -8); ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(-5, 8); ctx.lineTo(5, 8); ctx.lineTo(0, 0);
        ctx.closePath();
        ctx.fill();
        ctx.fillRect(-5.5, -9, 11, 1.4);
        ctx.fillRect(-5.5, 7.6, 11, 1.4);
        ctx.restore();
      } else if (p.modo === 'operaciones') {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.scale(p.escala, p.escala);
        ctx.fillStyle = p.color;
        ctx.font = '700 17px Quicksand, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.signo, 0, 0);
        ctx.restore();
      } else {
        ctx.save();
        ctx.globalAlpha = alpha * 0.9;
        ctx.shadowBlur  = 10;
        ctx.shadowColor = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radio, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        ctx.restore();
      }
    }

    ctx.globalAlpha = 1;
    if (particulas.length < CANTIDAD_OBJETIVO && Math.random() < 0.09) {
      particulas.push(nuevaParticula());
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>

</body>
