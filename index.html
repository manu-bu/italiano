<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1366, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Plantilla Idiomas">
<title>Plantilla Idiomas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

/* =====================================================================
   RESET Y BASE
   iPad Air 13" M2: 1366 × 1024pt en Safari landscape (punto lógico).
   La app es fija — no se adapta a otros tamaños.
===================================================================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  /* Dimensiones fijas */
  --w: 1366px;
  --h: 100dvh;
  --header-h: 72px;
  --mesa-top: 72px;

  /* Paleta neutra */
  --bg-app:        #e9e9e7;
  --border-header: #d4d4d2;
  --bg-mesa:       #d8d8d6;

  /* Selectores */
  --sel-bg:        #ffffff;
  --sel-border:    #b8b8b6;
  --sel-radius:    22px;
  --sel-h:         44px;
  --sel-font:      16.5px;
  --sel-color:     #9a9a98;

  /* Botones editor */
  --btn-size:      44px;
  --btn-bg:        #ffffff;
  --btn-border:    #b8b8b6;
  --btn-active-glow:#aaff00;
  --btn-active-border:#88cc00;

  /* Tarjetas */
  --card-bg:       #ffffff;
  --card-radius:   16px;
  --card-padding:  16px;
  --card-border-w: 3px;

  /* Fuente */
  --font: 'Quicksand', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}

html, body {
  width: var(--w);
  height: 100dvh;
  overflow: hidden;
  background: var(--bg-app);
  font-family: var(--font);
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* Fondo propio de la unidad Verbos — blanco puro en vez del gris neutro.
   El header ya es transparente (ver más abajo), así que solo hace
   falta pintar el body — el header hereda lo que se vea detrás. */
body.unidad-verbos {
  background: #ffffff;
}

/* Cultura tiene 3 temas (Alpi Italiani, Actividades, País) + Abecedario
   (unidad A). Cada uno enciende su PROPIA clase de body, con sus
   propias variables de color (--tema-c1..c5) — hoy los 3 valen lo
   mismo (marino/verde/arena/marrón/violeta, "campo alpino"), pero
   quedan desenganchados a propósito: Alpi Italiani y Actividades describen
   un LUGAR (los Alpes italianos), que no cambia aunque el idioma que
   se estudie sí cambie — solo País (+ Abecedario, que copia su
   paleta) representa "el país/idioma" y es lo que hay que retocar
   cuando esto se adapte a otro idioma (ej. Italia). Por eso, aunque
   los 3 se vean idénticos ahora, cada uno tiene su propio bloque acá
   abajo — cambiar uno no debería tocar los otros dos.

   El borde de selectores/tarjetas (más abajo) es una sola regla
   compartida que lee estas variables, así no hace falta triplicar el
   degradé — solo los valores de color están separados por tema. */
body.tema-pais-it {
  --tema-c1: #3F6B4A;
  --tema-c2: #C0392B;
  --tema-c3: #E8DCC0;
  --tema-c4: #B8862E;
  --tema-c5: #2C5F8A;
  background: #f2ede1;
}
body.tema-chamonix-it {
  --tema-c1: #2C4A6E;
  --tema-c2: #3F5D3A;
  --tema-c3: #D9C39A;
  --tema-c4: #B98A5E;
  --tema-c5: #6B4C7A;
  background: #dcedfa;
}
body.tema-actividadesvalle-it {
  --tema-c1: #2C4A6E;
  --tema-c2: #3F5D3A;
  --tema-c3: #D9C39A;
  --tema-c4: #B98A5E;
  --tema-c5: #6B4C7A;
  background: #dcedfa;
}

/* Fondo propio de Geografía y el Clima → Terreno — verde seco, apagado,
   para que la tarjeta/selectores blancos con borde pino/marrón/piedra/
   hueso resalten encima. */
body.tema-terreno {
  background: #b8be9b;
}

/* Fondo propio de Geografía y el Clima → Actividades — celeste muy
   clarito, para que la tarjeta/selectores blancos con borde naranja/
   fucsia/violeta resalten encima. Aplica a los dos sub-temas
   (Invierno, Verano), no hace falta bajar más nivel. */
body.tema-actividades {
  background: #e3f3fa;
}

/* Fondo propio de Geografía y el Clima → Clima y Estaciones — casi
   blanco, apenas un dejo celeste. */
body.tema-clima {
  background: #f2fafd;
}

/* Fondo propio de Geografía y el Clima → Flora y Fauna — verde pálido,
   apenas visible, para que la tarjeta blanca con borde hoja/flor/
   tierra/polen resalte encima. */
body.tema-flora-fauna {
  background: #e7efdd;
}

/* Fondo propio de la unidad Vocabulario — gris acero, neutralizado a
   propósito: tantas tarjetas ya usan color (géneros, la tarjeta de
   Colores) que un tema visual cargado quedaba compitiendo con todo eso
   en vez de sumar. Blanco/negro/gris nomás. Aplica a toda la unidad
   (no tiene tema/sub-tema, como Verbos). El texto en francés de las
   tarjetas sigue con su color de género de siempre
   (g-masc/g-fem/g-elidido/g-plural) — este tema no lo toca, solo pinta
   borde/fondo/partículas. */
body.unidad-vocabulario {
  background: #9aa0a6;
}

/* Fondo propio de Modos y Frases → Imperativo — amarillito bien
   clarito, para que resalte el borde rojo/naranja/amarillo, estridente
   a propósito (el imperativo es la forma de dar órdenes). */
body.tema-imperativo {
  background: #fdf3c8;
}

/* Fondo propio de Modos y Frases → Subjuntivo — lila muy lavado,
   apenas tono, para que resalte el borde violeta/lila/rosa. */
body.tema-subjuntivo {
  background: #f3e9f7;
}

/* Fondo propio de Modos y Frases → Preguntas — aguamarina lavado, con
   un pelín más de celeste que el borde para que se distinga de él en
   vez de mimetizarse. */
body.tema-preguntas {
  background: #e2f5f1;
}

/* Fondo propio de Modos y Frases → Frases — arena bien clarita. */
body.tema-frases {
  background: #f2e8d3;
}

/* Fondo propio de Modos y Frases → Negación — rojo bien desaturado y
   clarito, cuidando que no derive a rosa. */
body.tema-negacion {
  background: #efe1dd;
}

/* Fondo propio de Los Números y el Tiempo → El Tiempo — mismo arena
   de Frases (misma familia arena/ocre/marrón, con acento bordó). */
body.tema-eltiempo {
  background: #f2e8d3;
}

/* Fondo propio de la unidad Personas — violeta visón bien clarito.
   Aplica a los dos temas (Sujetos, Artículos), no hace falta bajar
   más nivel. */
body.unidad-personas {
  background: #e6dde3;
}

/* =====================================================================
   BARRA DE HERRAMIENTAS
===================================================================== */
header {
  position: fixed;
  top: 0; left: 0;
  width: var(--w);
  height: var(--header-h);
  background: transparent;
  border-bottom: none;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  z-index: 100;
}

/* --- SELECTORES (izquierda) --- */
.selectores {
  display: flex;
  align-items: center;
  gap: 10px;
}

.selector {
  height: var(--sel-h);
  border-radius: var(--sel-radius);
  border: var(--card-border-w) solid transparent;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #c8c8c6, #a0a0a0) border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  font-size: var(--sel-font);
  color: var(--sel-color);
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
  text-transform: uppercase;
}

/* Ancho mínimo diferenciado — el 1 es el más largo */
.sel-unidad   { min-width: 200px; }
.sel-tema     { min-width: 120px; }
.sel-subtema  { min-width: 100px; }

/* Estado activo (tiene contenido): borde de color, texto oscuro */
.selector.activo {
  color: #3a3a38;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #888886, #606060) border-box;
}

/* Verbos — borde tira LED en sentido horario, colores medidos de la
   tarjeta de referencia: rojo→naranja→amarillo→verde→azul→violeta→rosa */
.selector.verbos-activo {
  color: #2a2a28;
  font-weight: 600;
  background:
    linear-gradient(#fffef5, #fffef5) padding-box,
    conic-gradient(
      from 0deg,
      #E8392B,
      #D88436 51deg,
      #DEC648 102deg,
      #3FB84A 154deg,
      #4278D8 205deg,
      #7242CC 257deg,
      #E85CA0 308deg,
      #E8392B 360deg
    ) border-box;
}

/* Alpi Italiani / Actividades / País (+ Abecedario) — misma regla para los
   3, pero leyendo las variables --tema-cX que cada body.tema-XXX-fr
   define por su cuenta (ver el bloque de fondo, arriba) — así el
   degradé está escrito una sola vez, aunque las 3 fuentes de color
   sigan siendo independientes entre sí. 5 colores: marino, verde
   viñedo, arena, marrón panadería, violeta uva. Mezcla continua de
   punta a punta, un solo ciclo. Texto en el mismo marino que se usa
   para los títulos dentro de la tarjeta de País. */
.selector.cultura-fr-activo {
  color: var(--tema-c1);
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      var(--tema-c1) 0deg,
      var(--tema-c2) 72deg,
      var(--tema-c3) 144deg,
      var(--tema-c4) 216deg,
      var(--tema-c5) 288deg,
      var(--tema-c1) 360deg
    ) border-box;
}

/* Geografía y el Clima → Terreno — borde en cuatro colores (pino/
   marrón/piedra/hueso), mezclado de punta a punta como el resto.
   Texto en el mismo verde pino que se usa para los títulos dentro de
   las tarjetas de Terreno. */
.selector.terreno-activo {
  color: #3f6b4a;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #3f6b4a 0deg,
      #c7a177 90deg,
      #a6a79c 180deg,
      #f3f1e7 270deg,
      #3f6b4a 360deg
    ) border-box;
}

/* Geografía y el Clima → Actividades — borde naranja/fucsia/violeta
   con cyan, mezclado de punta a punta. El cyan queda con menos
   presencia (recorrido más corto entre sus vecinos) para que siga
   siendo la banda chica que pediste, sin dejar de fundirse del todo.
   Texto en violeta (el más oscuro de la paleta, mejor legibilidad
   sobre blanco). */
.selector.actividades-activo {
  color: #7c4dbf;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #f2994a 0deg,
      #d6409f 130deg,
      #8b5cf6 250deg,
      #4fd1d9 320deg,
      #f2994a 360deg
    ) border-box;
}

/* Geografía y el Clima → Clima y Estaciones — borde blanco/gris/
   celeste con amarillo y rosa, mezclado de punta a punta. El celeste
   ocupa el recorrido más largo (la banda "grande" que pediste) y
   amarillo/rosa quedan apretados entre sí (las bandas chicas). El
   fondo de pantalla y las partículas también usan esta paleta (ver
   más abajo), y el texto interno de cada tarjeta tiene su propio color
   (más abajo también). */
.selector.clima-activo {
  color: #5a8fb0;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #ffffff 0deg,
      #b0b0ae 75deg,
      #8ec6e0 190deg,
      #f0d878 280deg,
      #f0a8c0 320deg,
      #ffffff 360deg
    ) border-box;
}

/* Geografía y el Clima → Flora y Fauna — borde hoja/flor/tierra/polen,
   mezclado de punta a punta como el resto. Texto en verde hoja. */
.selector.flora-fauna-activo {
  color: #4d7a2e;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #6b9b4f 0deg,
      #c15b96 90deg,
      #8a6240 180deg,
      #d9a83e 270deg,
      #6b9b4f 360deg
    ) border-box;
}

/* Unidad Vocabulario — negro y gris, una sola vuelta (sin el blanco,
   sin repetir tres veces como antes). Texto en gris neutro, no en un
   color de la paleta — acá el color con significado es el de género
   de cada palabra (adentro de la tarjeta), no el del tema visual. */
.selector.vocabulario-activo {
  color: #3a3a38;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #2a2a28 0deg,
      #9a9a96 180deg,
      #2a2a28 360deg
    ) border-box;
}

/* Modos y Frases → Imperativo — rojo/naranja/amarillo, el ciclo se
   repite dos veces alrededor (a propósito estridente, el imperativo
   es la forma de dar órdenes). Texto en rojo. */
.selector.imperativo-activo {
  color: #E8392B;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #E8392B 0deg,
      #F2811D 60deg,
      #F5C518 120deg,
      #E8392B 180deg,
      #F2811D 240deg,
      #F5C518 300deg,
      #E8392B 360deg
    ) border-box;
}

/* Modos y Frases → Subjuntivo — violeta/lila/rosa, mismo criterio de
   ciclo repetido dos veces que Imperativo. Texto en violeta. */
.selector.subjuntivo-activo {
  color: #6B3FA0;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #6B3FA0 0deg,
      #B08FD8 60deg,
      #D875A8 120deg,
      #6B3FA0 180deg,
      #B08FD8 240deg,
      #D875A8 300deg,
      #6B3FA0 360deg
    ) border-box;
}

/* Modos y Frases → Preguntas — verde menta/turquesa/aguamarina, mismo
   criterio de ciclo repetido dos veces. Texto en turquesa (el más
   oscuro de los tres, mejor legibilidad). */
.selector.preguntas-activo {
  color: #1E8A90;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #6FC9A0 0deg,
      #2E9EA8 60deg,
      #3ECFAE 120deg,
      #6FC9A0 180deg,
      #2E9EA8 240deg,
      #3ECFAE 300deg,
      #6FC9A0 360deg
    ) border-box;
}

/* Modos y Frases → Frases — arena/ocre con acento marrón más fuerte,
   mismo criterio de ciclo repetido dos veces. Texto en marrón. */
.selector.frases-activo {
  color: #7A4A21;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #D9C39A 0deg,
      #C4993A 60deg,
      #7A4A21 120deg,
      #D9C39A 180deg,
      #C4993A 240deg,
      #7A4A21 300deg,
      #D9C39A 360deg
    ) border-box;
}

/* Modos y Frases → Negación — rojo/naranja/fucsia, mismo criterio de
   ciclo repetido dos veces que sus hermanos de la unidad (Imperativo,
   Subjuntivo, Preguntas, Frases). Texto en fucsia. */
.selector.negacion-activo {
  color: #B83A72;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #C0392B 0deg,
      #D9662D 60deg,
      #B83A72 120deg,
      #C0392B 180deg,
      #D9662D 240deg,
      #B83A72 300deg,
      #C0392B 360deg
    ) border-box;
}

/* Los Números y el Tiempo → El Tiempo — mismo arena/ocre/marrón de
   Frases, repetido dos veces, con un acento bordó metido una sola vez
   (no se repite como los otros tres). Texto en bordó. */
.selector.eltiempo-activo {
  color: #7A2E3A;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #D9C39A 0deg,
      #C4993A 50deg,
      #7A4A21 100deg,
      #D9C39A 150deg,
      #C4993A 200deg,
      #7A4A21 250deg,
      #7A2E3A 320deg,
      #D9C39A 360deg
    ) border-box;
}

/* Personas — borde con los mismos 4 colores de género que ya usan las
   tarjetas de Sujetos/Artículos (celeste masc/rosa fem/violeta
   elidido/oliva plural), mezclado de punta a punta, una sola vuelta.
   Texto general de la unidad en topo/visón (lila grisáceo). */
.selector.personas-activo {
  color: #7D6E7B;
  font-weight: 600;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    conic-gradient(
      from 0deg,
      #90B0C8 0deg,
      #D0A8B8 90deg,
      #C0A8D8 180deg,
      #C8D0B0 270deg,
      #90B0C8 360deg
    ) border-box;
}

/* Selector sin contenido siguiente — se achica a círculo */
.selector.circulo {
  min-width: 0 !important;
  width: var(--sel-h);
  padding: 0;
  pointer-events: none;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #d8d8d6, #c0c0be) border-box;
  color: transparent;
}

/* --- BOTONES EDICIÓN (derecha) --- */
.botones-edicion {
  display: flex;
  align-items: center;
  gap: 10px;
}

.btn-editor {
  width: var(--btn-size);
  height: var(--btn-size);
  border-radius: 50%;
  border: var(--card-border-w) solid transparent;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #c8c8c6, #a0a0a0) border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  cursor: pointer;
  position: relative;
  filter: grayscale(100%) opacity(0.5);
  transition: filter 0.15s, background 0.15s;
  flex-shrink: 0;
}

/* Prendido */
.btn-editor.activo {
  filter: none;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #88cc00, #aaff00) border-box;
  box-shadow:
    0 0 0 3px rgba(170,255,0,0.10),
    0 0 12px 3px rgba(170,255,0,0.28);
}

/* Botones de letra (Guardar = S, Tarjetas = T) en vez de emoji — el
   color "real" es este verde, que se ve gris apagado o a todo color
   según el mismo filtro grayscale/opacity de .btn-editor de arriba,
   sin necesitar reglas aparte para prendido/apagado. */
.btn-editor-letra {
  font-family: var(--font);
  font-weight: 700;
  font-size: 17px;
  color: #6a9a00;
}

/* Deshabilitado (mesa fija) */
.btn-editor.deshabilitado {
  pointer-events: none;
  opacity: 0.2;
  filter: grayscale(100%);
}

/* =====================================================================
   MESA DE TARJETAS
===================================================================== */
.mesa {
  position: fixed;
  top: var(--mesa-top);
  left: 0;
  width: var(--w);
  height: calc(100dvh - var(--mesa-top));
  background: transparent;
  overflow: hidden;
  z-index: 1;
}

/* Estado vacío */
.mesa-vacia {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #aaa;
  font-size: 17px;
  letter-spacing: 0.5px;
}

/* =====================================================================
   TARJETAS
   Regla fija: tamaño definido SOLO por contenido.
   No se pueden redimensionar. No salen de la mesa.
   Aparecen siempre en esquina superior izquierda al activarse.
   El título es la zona de arrastre.
===================================================================== */
.tarjeta {
  position: absolute;
  background: var(--card-bg);
  border-radius: var(--card-radius);
  border: var(--card-border-w) solid transparent;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #c8c8c6, #a0a0a0) border-box;
  display: inline-flex;
  flex-direction: column;
  width: max-content;
  min-width: 160px;
  max-width: var(--w);
}

.tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #c8c8c6, #a0a0a0) border-box;
  border: var(--card-border-w) solid transparent;
  border-radius: var(--card-radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Título — zona de arrastre */
.tarjeta-titulo {
  padding: 10px var(--card-padding) 8px;
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: #888886;
  border-bottom: 1px solid #ebebeb;
  border-radius: var(--card-radius) var(--card-radius) 0 0;
  cursor: grab;
}

.tarjeta-titulo:active { cursor: grabbing; }

/* Cuerpo de la tarjeta */
.tarjeta-cuerpo {
  padding: var(--card-padding);
}

/* =====================================================================
   TEXTO A VOZ
   Cualquier texto en el idioma en estudio (no la traducción) lleva
   esta clase — se toca para escuchar su pronunciación.
===================================================================== */
.hablar {
  cursor: pointer;
  font-weight: 700;
}
.hablar:active {
  opacity: 0.5;
}

/* =====================================================================
   TARJETA: COLUMNAS
   Primera columna con color de género (definido por unidad Personas).
   Segunda columna texto neutro.

   El ancho sigue siendo reactivo al contenido (width: max-content), pero
   el techo máximo es el ancho de la mesa de trabajo entera — ninguna
   tarjeta, tenga las columnas que tenga, puede necesitar más que eso
   para no salirse de la pantalla. Sin scroll: si hiciera falta, la
   tarjeta simplemente puede ocupar hasta todo el ancho de la mesa.
===================================================================== */
.tarjeta-columnas table {
  border-collapse: collapse;
  font-size: 16.5px;
  color: #3a3a38;
}
.tarjeta-columnas td {
  padding: 6px 16px;
  border-bottom: 1px solid #f0f0ee;
  vertical-align: middle;
  text-align: center;
  white-space: nowrap;
}
.tarjeta-columnas tr:last-child td { border-bottom: none; }

.tarjeta-columnas th {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.4px;
  text-transform: uppercase;
  color: #aaaaa8;
  text-align: center;
  padding: 0 16px 6px;
}

/* Lista con ícono — la columna de ícono queda angosta y centrada, el
   texto en francés alineado a la izquierda (a diferencia del resto de
   .tarjeta-columnas, que centra todo). */
.tarjeta-lista-iconos td {
  text-align: left;
}
.tarjeta-lista-iconos td.icono-fila {
  text-align: center;
  font-size: 17px;
  width: 30px;
  padding-right: 2px;
}

/* Términos con color propio — cada fila define su color por style
   inline (viene del dato, no es un valor fijo de la plantilla), acá
   solo se define el peso de la tipografía. */
.tarjeta-terminos-coloreados td.termino-coloreado {
  font-weight: 700;
}

/* Columna de dato extra (zonas, marcas, etc.) — alineada a la
   izquierda porque suele traer texto largo (listas separadas por
   coma), a diferencia del resto de .tarjeta-columnas que centra. */
.vocabulario-extra {
  text-align: left;
  white-space: normal !important;
  max-width: 360px;
}

/* =====================================================================
   TARJETA: COLORES
   Columna de swatch (círculo de color) + columnas de nombre por género/número.
===================================================================== */
.swatch {
  display: inline-block;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  border: 1px solid rgba(0,0,0,0.08);
  vertical-align: middle;
}

/* =====================================================================
   CÓDIGO DE COLOR POR GÉNERO/NÚMERO
   Se aplica al sujeto en tarjetas de columnas y variables.
   Colores definidos en la unidad de Personas (placeholder por ahora).
===================================================================== */
.g-masc   { color: #90B0C8; }
.g-fem    { color: #D0A8B8; }
.g-plural { color: #C8D0B0; }
.g-elidido { color: #C0A8D8; }

/* =====================================================================
   TARJETA: VARIABLE / CONTENIDO ELEGIBLE
   Botón circular en esquina sup. izquierda que abre un desplegable interno
   con los temas disponibles para mostrar dentro de la misma tarjeta.
===================================================================== */
.tarjeta.tarjeta-variable { position: relative; }

.tarjeta-selector-tema {
  position: absolute;
  top: 8px;
  left: 8px;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: #ffffff;
  border: 1px solid #c8c8c6;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: #9a9a98;
  cursor: pointer;
  z-index: 5;
}

.tarjeta-variable .tarjeta-titulo {
  padding-left: 36px;
}

.tarjeta-dropdown-interno {
  position: absolute;
  top: 34px;
  left: 8px;
  background: #ffffff;
  border: 1px solid #c8c8c6;
  border-radius: 10px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  min-width: 160px;
  z-index: 20;
  overflow: hidden;
  display: none;
}
.tarjeta-dropdown-interno.visible { display: block; }
.tarjeta-dropdown-interno .item {
  padding: 9px 14px;
  font-size: 15px;
  color: #3a3a38;
  cursor: pointer;
  border-bottom: 1px solid #f0f0ee;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.tarjeta-dropdown-interno .item:last-child { border-bottom: none; }
.tarjeta-dropdown-interno .item:hover { background: #f5f5f3; }
.tarjeta-dropdown-interno .item.seleccionado { font-weight: 600; }

/* =====================================================================
   TARJETA: TEXTO LARGO
   Única tarjeta que puede extenderse en ancho (hasta un máximo mayor
   que el resto) o en alto para contener párrafos sin interrupción.
===================================================================== */
.tarjeta.tarjeta-texto-largo {
  max-width: calc((var(--w) - 40px) / 2);
}
.tarjeta-texto-largo .tarjeta-cuerpo {
  font-size: 16px;
  line-height: 1.6;
  color: #4a4a48;
}
.tarjeta-texto-largo .tarjeta-cuerpo p {
  margin: 0 0 10px;
}
.tarjeta-texto-largo .tarjeta-cuerpo p:last-child {
  margin-bottom: 0;
}

/* =====================================================================
   TARJETA: RELOJES Y DIBUJOS
   Diales dibujados por código (SVG), no imágenes. La cantidad de
   relojes por tarjeta es variable — se acomodan en fila y ajustan.
===================================================================== */
.tarjeta-relojes .tarjeta-cuerpo {
  display: flex;
  flex-wrap: wrap;
  gap: 18px;
  justify-content: center;
}
.reloj-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.reloj-item .reloj-frase {
  font-size: 15.5px;
  font-weight: 600;
  color: #3a3a38;
  text-align: center;
  max-width: 110px;
}
.reloj-item .reloj-traduccion {
  font-size: 14px;
  color: #aaaaa8;
  text-align: center;
  max-width: 110px;
}

/* =====================================================================
   TARJETA: INFORMÁTICA
   Bloque de contenido libre (subtítulos, párrafos, listas) para mesas
   fijas — no se mueve, ocupa el espacio que se le da desde afuera.
===================================================================== */
.tarjeta-informatica .tarjeta-cuerpo {
  font-size: 16px;
  line-height: 1.6;
  color: #4a4a48;
  overflow: auto;
}
.bloque-info-subtitulo {
  font-size: 15px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: #888886;
  margin: 14px 0 6px;
}
.bloque-info-subtitulo:first-child { margin-top: 0; }
.bloque-info-parrafo {
  margin: 0 0 10px;
}
.bloque-info-lista {
  margin: 0 0 10px;
  padding-left: 18px;
}
.bloque-info-lista li {
  margin-bottom: 4px;
}

/* Alpi Italiani / Actividades / País (+ Abecedario) — mismo borde de 5
   colores que los selectores, en línea recta (las tarjetas son
   rectangulares, no un óvalo), leyendo las mismas variables --tema-cX.
   Cubre tanto tarjetas sueltas (mesa libre) como tarjetas fijas (País,
   Abecedario). Fondo blanco puro en los dos casos. */
body.tema-pais-it .tarjeta, body.tema-pais-it .tarjeta-fija,
body.tema-chamonix-it .tarjeta, body.tema-chamonix-it .tarjeta-fija,
body.tema-actividadesvalle-it .tarjeta, body.tema-actividadesvalle-it .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      var(--tema-c1) 0%, var(--tema-c2) 25%, var(--tema-c3) 50%, var(--tema-c4) 75%, var(--tema-c5) 100%
    ) border-box !important;
}

/* Geografía y el Clima → Terreno — mismo mecanismo que arriba, con los
   cuatro colores de la paleta Terreno mezclados de punta a punta. */
body.tema-terreno .tarjeta,
body.tema-terreno .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #3f6b4a 0%, #c7a177 33%, #a6a79c 66%, #f3f1e7 100%
    ) border-box !important;
}

/* Geografía y el Clima → Actividades — mismo mecanismo, naranja/
   fucsia/violeta con cyan, mezclado de punta a punta. El cyan queda al
   final con menos recorrido para que siga siendo la banda chica. */
body.tema-actividades .tarjeta,
body.tema-actividades .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #f2994a 0%, #d6409f 42%, #8b5cf6 75%, #4fd1d9 100%
    ) border-box !important;
}

/* Geografía y el Clima → Clima y Estaciones — blanco/gris/celeste con
   amarillo y rosa, mezclado de punta a punta. El celeste ocupa el
   tramo más largo y amarillo/rosa quedan apretados hacia el final
   (las bandas chicas). El fondo de pantalla y las partículas también
   usan esta paleta (ver más abajo). */
body.tema-clima .tarjeta,
body.tema-clima .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #ffffff 0%, #b0b0ae 22%, #8ec6e0 60%, #f0d878 82%, #f0a8c0 100%
    ) border-box !important;
}

/* Geografía y el Clima → Flora y Fauna — borde hoja/flor/tierra/polen,
   mezclado de punta a punta. Título de las tarjetas en verde hoja. */
body.tema-flora-fauna .tarjeta,
body.tema-flora-fauna .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #6b9b4f 0%, #c15b96 33%, #8a6240 66%, #d9a83e 100%
    ) border-box !important;
}
body.tema-flora-fauna .tarjeta-titulo {
  color: #4d7a2e;
}

/* Unidad Vocabulario — negro y gris nomás, una sola vuelta (sin el
   blanco, sin repetir). A propósito NO se colorea el título acá (a
   diferencia de Terreno/Flora y Fauna) — el color con significado
   dentro de esta tarjeta es el de género de cada palabra
   (g-masc/g-fem/g-elidido/g-plural), y no queremos que compita con
   el del tema visual. */
body.unidad-vocabulario .tarjeta,
body.unidad-vocabulario .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #2a2a28 0%, #9a9a96 100%
    ) border-box !important;
}

/* Modos y Frases → Imperativo — rojo/naranja/amarillo repetido dos
   veces en diagonal. Título en rojo, a tono con lo estridente. */
body.tema-imperativo .tarjeta,
body.tema-imperativo .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #E8392B 0%, #F2811D 16.66%, #F5C518 33.33%,
      #E8392B 50%, #F2811D 66.66%, #F5C518 83.33%,
      #E8392B 100%
    ) border-box !important;
}
body.tema-imperativo .tarjeta-titulo {
  color: #E8392B;
}

/* Modos y Frases → Subjuntivo — violeta/lila/rosa repetido dos veces
   en diagonal. Título en violeta. */
body.tema-subjuntivo .tarjeta,
body.tema-subjuntivo .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #6B3FA0 0%, #B08FD8 16.66%, #D875A8 33.33%,
      #6B3FA0 50%, #B08FD8 66.66%, #D875A8 83.33%,
      #6B3FA0 100%
    ) border-box !important;
}
body.tema-subjuntivo .tarjeta-titulo {
  color: #6B3FA0;
}

/* Modos y Frases → Preguntas — verde menta/turquesa/aguamarina
   repetido dos veces en diagonal. Título en turquesa. */
body.tema-preguntas .tarjeta,
body.tema-preguntas .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #6FC9A0 0%, #2E9EA8 16.66%, #3ECFAE 33.33%,
      #6FC9A0 50%, #2E9EA8 66.66%, #3ECFAE 83.33%,
      #6FC9A0 100%
    ) border-box !important;
}
body.tema-preguntas .tarjeta-titulo {
  color: #1E8A90;
}

/* Modos y Frases → Frases — arena/ocre con acento marrón repetido dos
   veces en diagonal. Título en marrón. */
body.tema-frases .tarjeta,
body.tema-frases .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #D9C39A 0%, #C4993A 16.66%, #7A4A21 33.33%,
      #D9C39A 50%, #C4993A 66.66%, #7A4A21 83.33%,
      #D9C39A 100%
    ) border-box !important;
}
body.tema-frases .tarjeta-titulo {
  color: #7A4A21;
}

/* Modos y Frases → Negación — rojo/naranja/fucsia repetido dos veces
   en diagonal, mismo criterio que sus hermanos. Título en fucsia. */
body.tema-negacion .tarjeta,
body.tema-negacion .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #C0392B 0%, #D9662D 16.66%, #B83A72 33.33%,
      #C0392B 50%, #D9662D 66.66%, #B83A72 83.33%,
      #C0392B 100%
    ) border-box !important;
}
body.tema-negacion .tarjeta-titulo {
  color: #B83A72;
}

/* Los Números y el Tiempo → El Tiempo — mismo arena/ocre/marrón que
   Frases, con el acento bordó metido una sola vez en la diagonal.
   Título en bordó. */
body.tema-eltiempo .tarjeta,
body.tema-eltiempo .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #D9C39A 0%, #C4993A 13.89%, #7A4A21 27.78%,
      #D9C39A 41.67%, #C4993A 55.56%, #7A4A21 69.44%,
      #7A2E3A 88.89%, #D9C39A 100%
    ) border-box !important;
}
body.tema-eltiempo .tarjeta-titulo {
  color: #7A2E3A;
}

/* Personas — mismo borde de 4 colores de género que el selector,
   en diagonal. Título en topo/visón. */
body.unidad-personas .tarjeta,
body.unidad-personas .tarjeta-fija {
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(
      135deg,
      #90B0C8 0%, #D0A8B8 33.33%, #C0A8D8 66.66%, #C8D0B0 100%
    ) border-box !important;
}
body.unidad-personas .tarjeta-titulo {
  color: #7D6E7B;
}

/* Los subtítulos internos y los términos en italiano destacados de la
   tarjeta de País usan los mismos dos colores fuertes de la paleta
   (verde bosque/terracota, vía las variables --tema-cX de tema-pais-it)
   para que el texto interno también hable la paleta, sin tocar el
   gris neutro del texto de cuerpo. Esto es específico del contenido
   de esa tarjeta (no del tema visual de la unidad en general), por
   eso sigue atado a su propio nombre de clase. */
.tarjeta-pais-italia .tarjeta-titulo {
  color: var(--tema-c1);
}
.tarjeta-pais-italia .bloque-info-subtitulo {
  color: var(--tema-c1);
}
.tarjeta-pais-italia .bloque-info-parrafo strong {
  color: var(--tema-c2);
}

/* Mismo criterio para el contenido de Terreno: título en verde pino,
   la columna de dato adicional (altura/acceso/dificultad) en marrón
   claro, para que hable la paleta sin tocar el resto del texto. */
.tarjeta-terreno .tarjeta-titulo {
  color: #3f6b4a;
}
.tarjeta-terreno td.terreno-extra {
  color: #a9773f;
}

/* =====================================================================
   TARJETA FIJA (mesa estática — Verbos)
   El grid de 4×2 se define desde afuera con JS/CSS Grid.
===================================================================== */
.mesa-fija {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(2, auto);
  gap: 12px;
  padding: 14px 16px;
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  align-items: start; /* el alto por fila ahora lo empareja JS con la medición real */
}

.tarjeta-fija .tarjeta-titulo {
  cursor: default;
  text-align: center;
  border-bottom: none;
  padding-bottom: 2px;
  font-size: 17px;
}

.tarjeta-fija-subtitulo {
  padding: 0 16px 8px;
  margin-top: 0px;
  font-size: 15px;
  font-style: italic;
  text-align: center;
  color: #aaaaa8;
}

.tarjeta-fija table.tabla-conjugacion {
  width: 100%;
  border-collapse: collapse;
  font-size: 16.5px;
}
.tarjeta-fija table.tabla-conjugacion td {
  padding: 4px 0;
  border-bottom: 1px solid #f0f0ee;
}
.tarjeta-fija table.tabla-conjugacion tr:last-child td {
  border-bottom: none;
}
.tarjeta-fija table.tabla-conjugacion td.persona {
  color: #3a3a38;
  font-weight: 700;
  padding-right: 10px;
  white-space: nowrap;
}

.tarjeta-fija-nota {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px dashed #e0e0de;
  font-size: 14px;
  line-height: 1.4;
  color: #b4b4b2;
}

/* =====================================================================
   MENÚ DESPLEGABLE (selectores al pulsar)
===================================================================== */
.dropdown {
  position: absolute;
  top: calc(var(--header-h) - 4px);
  left: 20px;
  background: #ffffff;
  border: 3px solid transparent;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #c8c8c6, #a0a0a0) border-box;
  border-radius: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.10);
  min-width: 200px;
  z-index: 500;
  overflow: hidden;
  display: none;
}

.dropdown.visible { display: block; }

.dropdown-item {
  padding: 12px 18px;
  font-size: 17px;
  color: #3a3a38;
  cursor: pointer;
  border-bottom: 1px solid #f0f0ee;
  transition: background 0.1s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: #f5f5f3; }
.dropdown-item.seleccionado { font-weight: 600; }

/* =====================================================================
   PANEL DE LA CAJA DE TARJETAS
   Se abre desde el botón de tarjetas (📋) y lista las tarjetas
   disponibles del nivel actual (unidad/tema/sub-tema), con su estado
   sacada/guardada.
===================================================================== */
.panel-caja {
  position: absolute;
  top: calc(var(--header-h) - 4px);
  right: 20px;
  background: #ffffff;
  border: 3px solid transparent;
  background:
    linear-gradient(#ffffff, #ffffff) padding-box,
    linear-gradient(135deg, #c8c8c6, #a0a0a0) border-box;
  border-radius: 14px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.10);
  min-width: 220px;
  z-index: 500;
  overflow: hidden;
  display: none;
}
.panel-caja.visible { display: block; }

.panel-caja-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 18px;
  font-size: 16px;
  color: #3a3a38;
  cursor: pointer;
  border-bottom: 1px solid #f0f0ee;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.panel-caja-item:last-child { border-bottom: none; }
.panel-caja-item:hover { background: #f5f5f3; }

.panel-caja-punto {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: #d0d0ce;
  flex-shrink: 0;
}
.panel-caja-item.sacada .panel-caja-punto {
  background: #88cc00;
}

.panel-caja-vacio {
  padding: 16px 18px;
  font-size: 15px;
  color: #aaaaa8;
  text-transform: none;
}

</style>
</head>
<body>

<!-- =====================================================================
     BARRA DE HERRAMIENTAS
===================================================================== -->
<header>

  <!-- SELECTORES IZQUIERDA -->
  <div class="selectores">
    <div class="selector sel-unidad" id="selUnidad" onclick="toggleDropdown('dropUnidad')">
      Unidad
    </div>
    <div class="selector sel-tema" id="selTema" onclick="toggleDropdown('dropTema')">
      Tema
    </div>
    <div class="selector sel-subtema" id="selSubtema" onclick="toggleDropdown('dropSubtema')">
      Sub-tema
    </div>
  </div>

  <!-- BOTONES EDICIÓN DERECHA -->
  <div class="botones-edicion">
    <div class="btn-editor btn-editor-letra deshabilitado" id="btnTarjetas" onclick="abrirTarjetas()" title="Tarjetas">T</div>
    <div class="btn-editor btn-editor-letra deshabilitado" id="btnGuardar"  onclick="guardar()"       title="Guardar">S</div>
    <div class="btn-editor deshabilitado" id="btnLapiz"    onclick="toggleEditor()"  title="Editor">✏️</div>
  </div>

</header>

<!-- DROPDOWNS -->
<div class="dropdown" id="dropUnidad"></div>
<div class="dropdown" id="dropTema"></div>
<div class="dropdown" id="dropSubtema"></div>

<!-- PANEL CAJA DE TARJETAS -->
<div class="panel-caja" id="panelCaja"></div>

<!-- =====================================================================
     MESA DE TARJETAS
===================================================================== -->

// IDIOMA_TTS es lo único que hay que cambiar al reusar la plantilla

// =========================================================================
const IDIOMA_TTS = 'it-IT';

function hablar(texto) {
  if (!texto || !('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel(); // corta cualquier lectura previa en curso
  const utter = new SpeechSynthesisUtterance(texto);
  utter.lang = IDIOMA_TTS;
  utter.rate = 0.92; // levemente más lento, para entrenar el oído
  window.speechSynthesis.speak(utter);
}

document.addEventListener('click', e => {
  const el = e.target.closest('[data-hablar]');
  if (el) hablar(el.dataset.hablar);
});

// ── Render: tarjeta de colores ──────────────────────────────────────────
function renderTarjetaColori() {
  const div = document.createElement('div');
  div.className = 'tarjeta';
  let filas = '';
  DATOS_COLORES.forEach(c => {
    const borde = c.bordeVisible ? 'border:1.5px solid #d0d0ce;' : '';
    filas += `<tr>
      <td><span class="swatch" style="background:${c.swatch};${borde}"></span></td>
      <td class="hablar" data-hablar="${c.ms}">${c.ms}</td>
      <td class="hablar" data-hablar="${c.mp}">${c.mp}</td>
      <td class="hablar" data-hablar="${c.fs}">${c.fs}</td>
      <td class="hablar" data-hablar="${c.fp}">${c.fp}</td>
    </tr>`;
  });
  div.innerHTML = `
    <div class="tarjeta-titulo">Colores</div>
    <div class="tarjeta-cuerpo tarjeta-columnas">
      <table>
        <tr><th></th><th>Masc. S</th><th>Masc. P</th><th>Fem. S</th><th>Fem. P</th></tr>
        ${filas}
      </table>
    </div>`;
  return div;
}

// ── Render: tarjeta de vocabulario (variable / contenido elegible) ─────
function renderTarjetaVocabolario(temaKey) {
  const key = temaKey && TEMAS_VOCABULARIO[temaKey] ? temaKey : 'lugares-hotel';
  const tema = TEMAS_VOCABULARIO[key];

  const div = document.createElement('div');
  div.className = 'tarjeta tarjeta-variable';
  div.dataset.temaActual = key;

  let filas = '';
  tema.items.forEach(it => {
    filas += `<tr>
      <td class="g-${it.g} hablar" data-hablar="${it.fr}">${it.fr}</td>
      <td>${it.es}</td>
    </tr>`;
  });

  let opciones = '';
  Object.entries(TEMAS_VOCABULARIO).forEach(([k, t]) => {
    opciones += `<div class="item${k === key ? ' seleccionado' : ''}" data-tema-opcion="${k}">${t.nombre}</div>`;
  });

  div.innerHTML = `
    <div class="tarjeta-selector-tema">▾</div>
    <div class="tarjeta-dropdown-interno">${opciones}</div>
    <div class="tarjeta-titulo">Vocabulario — ${tema.nombre}</div>
    <div class="tarjeta-cuerpo tarjeta-columnas">
      <table>${filas}</table>
    </div>`;

  const btn = div.querySelector('.tarjeta-selector-tema');
  const drop = div.querySelector('.tarjeta-dropdown-interno');
  btn.addEventListener('click', ev => {
    ev.stopPropagation();
    drop.classList.toggle('visible');
  });
  drop.querySelectorAll('.item').forEach(item => {
    item.addEventListener('click', ev => {
      ev.stopPropagation();
      const nuevoKey = item.dataset.temaOpcion;
      const nueva = renderTarjetaVocabulario(nuevoKey);
      nueva.style.left = div.style.left;
      nueva.style.top  = div.style.top;
      nueva.style.zIndex = div.style.zIndex;
      div.replaceWith(nueva);
      activarArrastre(nueva, 'vocabulario');
    });
  });

  return div;
}

      div.replaceWith(nueva);
      activarArrastre(nueva, 'terreno');
    });
  });

  return div;
}

// ── Tarjeta de texto largo ──────────────────────────────────────────────
// def = { titulo, parrafos: [string, ...] }
function crearTarjetaTextoLargo(def) {

// ── Tarjeta de relojes y dibujos ─────────────────────────────────────────
// def = { titulo, relojes: [{ hora, minuto, etiqueta }, ...] }
// La cantidad de relojes es libre — el layout se acomoda solo (flex-wrap).
function dibujarRelojSVG(hora, minuto, size) {
  size = size || 76;
  const cx = size / 2, cy = size / 2, r = size / 2 - 4;
  const anguloHora   = ((hora % 12) + minuto / 60) / 12 * 360 - 90;
  const anguloMinuto = (minuto / 60) * 360 - 90;
  const largoHora   = r * 0.5;
  const largoMinuto = r * 0.75;
  const hx = cx + largoHora   * Math.cos(anguloHora   * Math.PI / 180);
  const hy = cy + largoHora   * Math.sin(anguloHora   * Math.PI / 180);
  const mx = cx + largoMinuto * Math.cos(anguloMinuto * Math.PI / 180);
  const my = cy + largoMinuto * Math.sin(anguloMinuto * Math.PI / 180);

  let marcas = '';
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * 360 - 90;
    const x1 = cx + (r - 2) * Math.cos(a * Math.PI / 180);
    const y1 = cy + (r - 2) * Math.sin(a * Math.PI / 180);
    const x2 = cx + (r - 7) * Math.cos(a * Math.PI / 180);
    const y2 = cy + (r - 7) * Math.sin(a * Math.PI / 180);
    marcas += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#c8c8c6" stroke-width="1.5"/>`;
  }

  return `
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="#ffffff" stroke="#b8b8b6" stroke-width="2"/>
      ${marcas}
      <line x1="${cx}" y1="${cy}" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#3a3a38" stroke-width="3" stroke-linecap="round"/>
      <line x1="${cx}" y1="${cy}" x2="${mx.toFixed(1)}" y2="${my.toFixed(1)}" stroke="#3a3a38" stroke-width="2" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="2.5" fill="#3a3a38"/>
    </svg>`;
}

// def = { titulo, relojes: [{ hora, minuto, frase, traduccion }, ...] }
// 'frase' es cómo se dice esa hora en el idioma en estudio (queda tocable
// para escucharla) y 'traduccion' es su versión en español, chiquita y gris.
// Cada idioma arma sus propias frases según su propia convención horaria
// (y cuarto / y media / menos cuarto, o la que corresponda) — no se calcula
// automáticamente, se carga como dato, igual que el resto del contenido.
function crearTarjetaRelojes(def) {
  const div = document.createElement('div');
  div.className = 'tarjeta tarjeta-relojes';
  const itemsHtml = def.relojes.map(r => `
    <div class="reloj-item">
      ${dibujarRelojSVG(r.hora, r.minuto)}
      <div class="reloj-frase hablar" data-hablar="${r.frase}">${r.frase}</div>
      <div class="reloj-traduccion">${r.traduccion}</div>
    </div>`).join('');
  div.innerHTML = `
    <div class="tarjeta-titulo">${def.titulo}</div>
    <div class="tarjeta-cuerpo">${itemsHtml}</div>`;
  return div;
}

// ── Tarjeta de informática (mesa fija, bloque libre) ─────────────────────
// def = { titulo, bloques: [{ tipo: 'subtitulo'|'parrafo'|'lista', contenido }] }
// contenido es string para subtitulo/parrafo, o array de strings para lista.
function crearTarjetaInformatica(def) {
  const div = document.createElement('div');
  div.className = 'tarjeta-fija tarjeta-informatica';
  const bloquesHtml = def.bloques.map(b => {
    if (b.tipo === 'subtitulo') return `<div class="bloque-info-subtitulo">${b.contenido}</div>`;
    if (b.tipo === 'lista') return `<ul class="bloque-info-lista">${b.contenido.map(li => `<li>${li}</li>`).join('')}</ul>`;
    return `<p class="bloque-info-parrafo">${b.contenido}</p>`;
  }).join('');
  div.innerHTML = `
    <div class="tarjeta-titulo">${def.titulo}</div>
    <div class="tarjeta-cuerpo">${bloquesHtml}</div>`;
  return div;
}

// ── Tarjeta de lista con ícono ───────────────────────────────────────────
// def = { titulo, filas: [{ icono, fr }], colorTitulo? }
// Para frases o palabras sueltas donde el ícono hace de "traducción"
// visual en vez de una columna en español — pensada para asociar por
// patrón/sensación en vez de memorizar la traducción literal.
// colorTitulo es opcional — para cuando el tema visual de la unidad
// pide que cada tarjeta hable con un color propio de la paleta.
function crearTarjetaListaIconos(def) {
  const div = document.createElement('div');
  div.className = 'tarjeta tarjeta-columnas tarjeta-lista-iconos';
  const filasHtml = def.filas.map(f => `
    <tr>
      <td class="icono-fila">${f.icono}</td>
      <td class="hablar" data-hablar="${f.fr}">${f.fr}</td>
    </tr>`).join('');
  const estiloTitulo = def.colorTitulo ? ` style="color:${def.colorTitulo};"` : '';
  div.innerHTML = `
    <div class="tarjeta-titulo"${estiloTitulo}>${def.titulo}</div>
    <div class="tarjeta-cuerpo">
      <table>${filasHtml}</table>
    </div>`;
  return div;
}

// ── Tarjeta de términos con color propio ─────────────────────────────────
// def = { titulo, columnaExtra, filas: [{ fr, color, extra }] }
// Para grupos de términos que conviene distinguir por color (estaciones,
// tiempos verbales, lo que haga falta) + un dato extra al lado (acá:
// los meses que le corresponden a cada estación).
function crearTarjetaTerminosColoreados(def) {

// ── Tarjeta de vocabulario fijo (fr/es, sin desplegable) ─────────────────
// def = { titulo, filas: [{ fr, es, g }] }
// Para listas fr/es que no necesitan compartir tarjeta con otros temas

// para alternar entre temas — acá cada lista es su propia tarjeta fija).
// g: 'masc' | 'fem' | 'plural', mismo criterio de color que Vocabulario.
function crearTarjetaVocabularioFijo(def) {

// crearTarjetaVocabularioFijo, que exige un color de género por fila.

// ── Tarjeta de vocabulario fijo con columna extra (fr/es/dato) ───────────
// def = { titulo, columnaExtra, filas: [{ fr, es, extra, g? }] }
// Como crearTarjetaVocabularioFijo, pero con una tercera columna de dato
// libre (zonas, marcas, lo que haga falta) — sin color por género, a
// diferencia de esa, porque acá el foco es el dato extra, no el género.
// g es opcional: cuando el francés es un sustantivo con género propio
// (no un nombre propio), se puede colorear igual que en Vocabulario.
function crearTarjetaVocabularioExtra(def) {
  const div = document.createElement('div');
  div.className = 'tarjeta tarjeta-columnas';
  const filasHtml = def.filas.map(it => `
    <tr>
      <td class="hablar${it.g ? ` g-${it.g}` : ''}" data-hablar="${it.fr}">${it.fr}</td>
      <td>${it.es}</td>
      <td class="vocabulario-extra">${it.extra}</td>
    </tr>`).join('');
  div.innerHTML = `
    <div class="tarjeta-titulo">${def.titulo}</div>
    <div class="tarjeta-cuerpo">
      <table>
        <tr><th>Italiano</th><th>Español</th><th>${def.columnaExtra}</th></tr>
        ${filasHtml}
      </table>
    </div>`;
  return div;
}

// ── Tarjeta de tabla libre (N columnas) ──────────────────────────────────
// def = { titulo, columnas: [string,...], filas: [[celda,...], ...] }
// Cada celda puede ser un string plano, o { texto, hablar, color } para
// marcarla como francés hablable y/o pintarla con un color propio (ej:
// azul/rosa/morado/oliva para masc/fem/elidido/plural). Pensada para
// tablas que no encajan en los tipos ya armados (2-3 columnas fijas) —
// declinaciones, casos gramaticales, cualquier tabla con su propia
// cantidad de columnas.
function crearTarjetaTablaGenerica(def) {
  const div = document.createElement('div');
  div.className = 'tarjeta tarjeta-columnas';
  const renderCelda = c => {
    if (c && typeof c === 'object') {
      const clases = ['hablar', c.color ? `g-${c.color}` : null].filter(Boolean).join(' ');
      return c.hablar
        ? `<td class="${clases}" data-hablar="${c.texto}">${c.texto}</td>`
        : `<td class="${c.color ? `g-${c.color}` : ''}">${c.texto}</td>`;
    }
    return `<td>${c}</td>`;
  };
  const headerHtml = '<tr>' + def.columnas.map(c => `<th>${c}</th>`).join('') + '</tr>';
  const filasHtml = def.filas.map(fila => '<tr>' + fila.map(renderCelda).join('') + '</tr>').join('');
  div.innerHTML = `
    <div class="tarjeta-titulo">${def.titulo}</div>
    <div class="tarjeta-cuerpo">
      <table>${headerHtml}${filasHtml}</table>
    </div>`;
  return div;
}

// ── Utilidad de color ────────────────────────────────────────────────
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Dropdowns ─────────────────────────────────────────────────────────
function toggleDropdown(id) {
  const todos = document.querySelectorAll('.dropdown');
  const target = document.getElementById(id);
  const yaAbierto = target.classList.contains('visible');
  todos.forEach(d => d.classList.remove('visible'));
  if (!yaAbierto) target.classList.add('visible');
}

// Cerrar al tocar fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.selector') && !e.target.closest('.dropdown')) {
    document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));
  }
});

// ── Actualizar estado visual de los 3 selectores ──────────────────────
function actualizarSelectores() {
  const u = estado.unidad ? UNIDADES[estado.unidad] : null;

  // Selector 1 — siempre activo con el nombre de la unidad. Se
  // reescribe el className entero (igual que s2 y s3 más abajo) en vez
  // de sacar clases una por una — así, sea cual sea el tema visual que
  // haya estado puesto antes (verbos-activo, cultura-fr-activo, o el
  // que se agregue a futuro), queda limpio de entrada y solo lleva la
  // clase del tema que le corresponde a la unidad/tema actual.
  const s1 = document.getElementById('selUnidad');
  s1.textContent = u ? u.nombre : 'Unidad';
  s1.className = 'selector sel-unidad' + (u ? ' activo' : '');

  const s2 = document.getElementById('selTema');
  const s3 = document.getElementById('selSubtema');

  // Sin unidad
  if (!u) {
    s2.textContent = ''; s2.className = 'selector sel-tema circulo';
    s3.textContent = ''; s3.className = 'selector sel-subtema circulo';
    return;
  }

  // Con temas
  if (u.temas) {
    const primerTemaKey = Object.keys(u.temas)[0];
    const temaActual = estado.tema || primerTemaKey;
    if (!estado.tema) estado.tema = primerTemaKey;
    s2.textContent = UNIDADES[estado.unidad].temas[temaActual].nombre;
    s2.className = 'selector sel-tema activo';
    s2.style.pointerEvents = '';

    // Con sub-temas
    const temaObj = u.temas[temaActual];
    if (temaObj.subtemas) {
      const primerSubKey = Object.keys(temaObj.subtemas)[0];
      if (!estado.subtema) estado.subtema = primerSubKey;
      // El desplegable de sub-tema puede no estar poblado todavía si
      // el tema activo fue auto-seleccionado acá arriba (el usuario
      // nunca clickeó el selector de Tema) — lo poblamos siempre para
      // que el selector de Sub-tema funcione sin pasos previos.
      poblarDropSubtema(temaObj);
      const subObj = temaObj.subtemas[estado.subtema];
      // En Verbos, el sub-tema muestra: español · verbo en el idioma · participio
      s3.textContent = (estado.unidad === 'G' && subObj.verbo)
        ? `${subObj.nombre} · ${subObj.verbo} · ${subObj.participio}`
        : subObj.nombre;
      s3.className = 'selector sel-subtema activo';
      s3.style.pointerEvents = '';
    } else {
      s3.textContent = '';
      s3.className = 'selector sel-subtema circulo';
    }
  } else {
    // Sin temas — selector 2 y 3 en círculo
    estado.tema = null;
    estado.subtema = null;
    s2.textContent = ''; s2.className = 'selector sel-tema circulo';
    s3.textContent = ''; s3.className = 'selector sel-subtema circulo';
  }

  // En Verbos, los tres selectores activos llevan el borde arcoíris
  // en vez del borde gris genérico — aplica a toda la unidad.
  if (estado.unidad === 'G') {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('verbos-activo');
      }
    });
  }

  // País (B3) + Abecedario (unidad A) son los ÚNICOS que de verdad
  // comparten identidad: Abecedario es el alfabeto del idioma/país que
  // se estudia, así que tiene sentido que copie la paleta de País —
  // cuando esto se adapte a otro idioma (ej. Italia), cambiando la
  // paleta de tema-pais-fr en un solo lugar, los dos quedan
  // actualizados juntos.
  const esPaisIt = estado.unidad === 'A' || (estado.unidad === 'B' && estado.tema === 'B3');
  document.body.classList.toggle('tema-pais-it', esPaisIt);

  // Alpi Italiani (B1) y Actividades (B2) describen un LUGAR (los Alpes
  // italianos), no el idioma — por eso van sueltos, cada uno con su
  // propia condición y su propia clase, aunque hoy compartan los
  // mismos valores de color que País. Si el día de mañana se adapta la
  // plantilla a otro idioma, estos dos NO deberían cambiar (el valle
  // sigue siendo el mismo), a diferencia de País/Abecedario.
  const esChamonixIt = estado.unidad === 'B' && estado.tema === 'B1';
  document.body.classList.toggle('tema-chamonix-it', esChamonixIt);

  const esActividadesValleIt = estado.unidad === 'B' && estado.tema === 'B2';
  document.body.classList.toggle('tema-actividadesvalle-it', esActividadesValleIt);

  // El selector visual (borde) sí es una sola clase compartida entre
  // los 3, porque su apariencia depende de las variables --tema-cX que
  // cada body.tema-XXX-fr define por su cuenta (ver el CSS) — no hace
  // falta triplicar la regla del selector para mantener la
  // independencia de las 3 fuentes de color.
  if (esPaisIt || esChamonixIt || esActividadesValleIt) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('cultura-fr-activo');
      }
    });
  }

  // Geografía y el Clima → Terreno (C1) — estética propia: verde pino,
  // marrón claro, gris piedra y blanco hueso, con transiciones más
  // suaves que la bandera.
  const esTerreno = estado.unidad === 'C' && estado.tema === 'C1';
  document.body.classList.toggle('tema-terreno', esTerreno);
  if (esTerreno) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('terreno-activo');
      }
    });
  }

  // Geografía y el Clima → Actividades (C4) — estética propia: naranja,
  // fucsia y violeta con una banda chica de cyan. Aplica al tema entero
  // (los dos sub-temas, Invierno y Verano), no hace falta bajar más.
  const esActividades = estado.unidad === 'C' && estado.tema === 'C4';
  document.body.classList.toggle('tema-actividades', esActividades);
  if (esActividades) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('actividades-activo');
      }
    });
  }

  // Geografía y el Clima → Clima y Estaciones (C3) — borde de
  // selectores/tarjetas (blanco/gris/celeste con amarillo y rosa de
  // acento). El fondo de pantalla y las partículas también usan esta
  // paleta (ver más abajo).
  const esClima = estado.unidad === 'C' && estado.tema === 'C3';
  document.body.classList.toggle('tema-clima', esClima);
  if (esClima) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('clima-activo');
      }
    });
  }

  // Geografía y el Clima → Flora y Fauna (C2) — estética propia: verde
  // hoja, rosa flor, marrón tierra y amarillo polen.
  const esFloraFauna = estado.unidad === 'C' && estado.tema === 'C2';
  document.body.classList.toggle('tema-flora-fauna', esFloraFauna);
  if (esFloraFauna) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('flora-fauna-activo');
      }
    });
  }

  // Vocabulario (unidad H) — estética propia: tinta, terracota,
  // mostaza y salvia. Aplica a nivel unidad, no tema, porque H no
  // tiene temas/sub-temas (misma lógica que Verbos).
  const esVocabulario = estado.unidad === 'H';
  document.body.classList.toggle('unidad-vocabulario', esVocabulario);
  if (esVocabulario) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('vocabulario-activo');
      }
    });
  }

  // Modos y Frases → Imperativo (E1) — estética propia: rojo, naranja
  // y amarillo, a propósito estridente.
  const esImperativo = estado.unidad === 'E' && estado.tema === 'E1';
  document.body.classList.toggle('tema-imperativo', esImperativo);
  if (esImperativo) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('imperativo-activo');
      }
    });
  }

  // Modos y Frases → Subjuntivo (E2) — estética propia: violeta, lila
  // y rosa.
  const esSubjuntivo = estado.unidad === 'E' && estado.tema === 'E2';
  document.body.classList.toggle('tema-subjuntivo', esSubjuntivo);
  if (esSubjuntivo) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('subjuntivo-activo');
      }
    });
  }

  // Modos y Frases → Preguntas (E3) — estética propia: verde menta,
  // turquesa y aguamarina.
  const esPreguntas = estado.unidad === 'E' && estado.tema === 'E3';
  document.body.classList.toggle('tema-preguntas', esPreguntas);
  if (esPreguntas) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('preguntas-activo');
      }
    });
  }

  // Modos y Frases → Frases (E4) — estética propia: arena, ocre y
  // acento marrón.
  const esFrases = estado.unidad === 'E' && estado.tema === 'E4';
  document.body.classList.toggle('tema-frases', esFrases);
  if (esFrases) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('frases-activo');
      }
    });
  }

  // Modos y Frases → Negación (E5) — estética propia: rojo, naranja y
  // fucsia.
  const esNegacion = estado.unidad === 'E' && estado.tema === 'E5';
  document.body.classList.toggle('tema-negacion', esNegacion);
  if (esNegacion) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('negacion-activo');
      }
    });
  }

  // Los Números y el Tiempo → El Tiempo (D2) — mismo estilo que
  // Frases (arena/ocre/marrón), con un acento bordó de más.
  const esElTiempo = estado.unidad === 'D' && estado.tema === 'D2';
  document.body.classList.toggle('tema-eltiempo', esElTiempo);
  if (esElTiempo) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('eltiempo-activo');
      }
    });
  }

  // Personas (unidad F) — estética propia: los 4 colores de género
  // (celeste/rosa/violeta/oliva) aplicados a la unidad entera, ya que
  // Sujetos y Artículos comparten el mismo criterio de color.
  const esPersonas = estado.unidad === 'F';
  document.body.classList.toggle('unidad-personas', esPersonas);
  if (esPersonas) {
    [s1, s2, s3].forEach(s => {
      if (s.classList.contains('activo')) {
        s.classList.remove('activo');
        s.classList.add('personas-activo');
      }
    });
  }
}

// ── Resolver tipo de mesa ────────────────────────────────────────────
// El tipo de mesa lo define la rama más profunda con contenido:
// sub-tema > tema > unidad. Así "País" puede ser fija dentro de una
// unidad libre, sin afectar a sus temas hermanos.
function resolverTipoMesa() {
  const u = UNIDADES[estado.unidad];
  if (!u) return null;
  if (estado.tema && u.temas && u.temas[estado.tema]) {
    const t = u.temas[estado.tema];
    if (estado.subtema && t.subtemas && t.subtemas[estado.subtema]) {
      const s = t.subtemas[estado.subtema];
      if (s.tipo) return s.tipo;
    }
    if (t.tipo) return t.tipo;
  }
  return u.tipo;
}

// ── Elegir unidad ─────────────────────────────────────────────────────
function elegirUnidad(key, nombre, tipo) {
  estado.unidad   = key;
  estado.tema     = null;
  estado.subtema  = null;
  estado.tipoMesa = tipo;

  document.body.classList.toggle('unidad-verbos', key === 'G');

  // Solo apagar editor si es mesa fija
  if (tipo === 'fija' && estado.editor) apagarEditor();
  // Prender editor si es mesa libre
  if (tipo === 'libre') estado.editor = true;

  // Llenar dropdown de temas
  const dropTema = document.getElementById('dropTema');
  dropTema.innerHTML = '';
  const u = UNIDADES[key];
  if (u.temas) {
    Object.entries(u.temas).forEach(([k, t]) => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.textContent = t.nombre;
      div.onclick = () => elegirTema(k, t.nombre);
      dropTema.appendChild(div);
    });
  }

  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));
  actualizarBotones();
  actualizarSelectores();
  renderMesa();
}

// ── Poblar el desplegable de Sub-tema para un tema dado ────────────────
// Extraído como función aparte porque hace falta llamarlo tanto al
// elegir tema a mano (elegirTema) como cuando actualizarSelectores()
// auto-selecciona el primer tema/sub-tema sin que el usuario haya
// tocado el selector de Tema todavía (ej: al entrar directo a Verbos).
function poblarDropSubtema(temaObj) {
  const dropSub = document.getElementById('dropSubtema');
  dropSub.innerHTML = '';
  if (temaObj.subtemas) {
    Object.entries(temaObj.subtemas).forEach(([k, s]) => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.textContent = (estado.unidad === 'G' && s.verbo) ? `${s.nombre} · ${s.verbo}` : s.nombre;
      div.onclick = () => elegirSubtema(k, s.nombre);
      dropSub.appendChild(div);
    });
  }
}

// ── Elegir tema ───────────────────────────────────────────────────────
function elegirTema(key, nombre) {
  estado.tema    = key;
  estado.subtema = null;

  // Sub-temas del tema elegido
  const u = UNIDADES[estado.unidad];
  const t = u.temas[key];
  poblarDropSubtema(t);

  estado.tipoMesa = resolverTipoMesa();
  if (estado.tipoMesa === 'fija' && estado.editor) apagarEditor();
  // Activar editor si es mesa libre
  if (estado.tipoMesa === 'libre') estado.editor = true;

  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));
  actualizarBotones();
  actualizarSelectores();
  renderMesa();
}

// ── Elegir sub-tema ───────────────────────────────────────────────────
function elegirSubtema(key, nombre) {
  estado.subtema = key;

  estado.tipoMesa = resolverTipoMesa();
  if (estado.tipoMesa === 'fija' && estado.editor) apagarEditor();
  // Activar editor si es mesa libre
  if (estado.tipoMesa === 'libre') estado.editor = true;

  document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('visible'));
  actualizarBotones();
  actualizarSelectores();
  renderMesa();
}

// ── Botones de edición ────────────────────────────────────────────────
function actualizarBotones() {
  const esFija = estado.tipoMesa === 'fija';
  ['btnLapiz','btnTarjetas','btnGuardar'].forEach(id => {
    const btn = document.getElementById(id);
    if (esFija) {
      btn.classList.add('deshabilitado');
      btn.classList.remove('activo');
    } else {
      btn.classList.remove('deshabilitado');
      // En mesas libres, prender luz de los 3 botones si editor está activo
      if (estado.editor) {
        btn.classList.add('activo');
      } else {
        btn.classList.remove('activo');
      }
    }
  });
}

function toggleEditor() {
  if (estado.tipoMesa === 'fija') return;
  estado.editor = !estado.editor;
  const lapiz    = document.getElementById('btnLapiz');
  const tarjetas = document.getElementById('btnTarjetas');
  const guardar  = document.getElementById('btnGuardar');

  if (estado.editor) {
    lapiz.classList.add('activo');
    tarjetas.classList.add('activo');
    guardar.classList.add('activo');
  } else {
    apagarEditor();
  }
}

function apagarEditor() {
  estado.editor = false;
  ['btnLapiz','btnTarjetas','btnGuardar'].forEach(id => {
    document.getElementById(id).classList.remove('activo');
  });
}

function abrirTarjetas() {
  if (!estado.editor) return;
  const panel = document.getElementById('panelCaja');
  const clave = claveNivelActual();
  const disponibles = CONTENIDO_TARJETAS[clave] || [];

  if (!estado.sacadas[clave]) estado.sacadas[clave] = [];

  panel.innerHTML = '';
  if (disponibles.length === 0) {
    panel.innerHTML = '<div class="panel-caja-vacio">Sin tarjetas cargadas en este nivel</div>';
  } else {
    disponibles.forEach(t => {
      const sacada = estado.sacadas[clave].includes(t.id);
      const item = document.createElement('div');
      item.className = 'panel-caja-item' + (sacada ? ' sacada' : '');
      item.innerHTML = `<span>${t.titulo}</span><span class="panel-caja-punto"></span>`;
      item.onclick = () => {
        if (estado.sacadas[clave].includes(t.id)) {
          guardarTarjeta(clave, t.id);
        } else {
          sacarTarjeta(clave, t.id);
        }
        abrirTarjetas();
      };
      panel.appendChild(item);
    });
  }

  panel.classList.toggle('visible');
}

function sacarTarjeta(clave, id) {
  if (!estado.sacadas[clave]) estado.sacadas[clave] = [];
  if (!estado.sacadas[clave].includes(id)) {
    estado.sacadas[clave].push(id);
    delete estado.tarjetas[id]; // vuelve a aparecer en la esquina sup. izq.
  }
  renderMesa();
}

function guardarTarjeta(clave, id) {
  if (!estado.sacadas[clave]) return;
  estado.sacadas[clave] = estado.sacadas[clave].filter(x => x !== id);
  renderMesa();
}

// Cerrar el panel de la caja al tocar fuera
document.addEventListener('click', e => {
  if (!e.target.closest('.panel-caja') && !e.target.closest('#btnTarjetas')) {
    document.getElementById('panelCaja').classList.remove('visible');
  }
});

function guardar() {
  if (!estado.editor) return;
  localStorage.setItem('idiomasZero_estado', JSON.stringify({
    tarjetas: estado.tarjetas,
    sacadas:  estado.sacadas
  }));
  const btn = document.getElementById('btnGuardar');
  // Efecto de confirmación: "!" rojo fuerte en vez del tilde ✅, y
  // vuelve a la letra "S" (no al disquete viejo) al terminar.
  btn.textContent = '!';
  btn.style.color = '#e8392b';
  setTimeout(() => {
    btn.textContent = 'S';
    btn.style.color = '';
  }, 800);
}

// Cargar posiciones y tarjetas sacadas guardadas (si existen)
(function cargarEstadoGuardado() {
  try {
    const guardado = JSON.parse(localStorage.getItem('idiomasZero_estado'));
    if (guardado) {
      if (guardado.tarjetas) estado.tarjetas = guardado.tarjetas;
      if (guardado.sacadas)  estado.sacadas  = guardado.sacadas;
    }
  } catch (e) { /* sin datos guardados aún */ }
})();

// ── Render de mesa ────────────────────────────────────────────────────
function renderMesa() {
  const mesa = document.getElementById('mesa');

  if (!estado.unidad) {
    mesa.innerHTML = '<div class="mesa-vacia">Seleccioná una unidad para empezar</div>';
    return;
  }

  if (estado.tipoMesa === 'fija') {
    renderMesaFija(mesa);
  } else {
    renderMesaLibre(mesa);
  }
}

// Mesa fija: cada unidad/tema de mesa fija tiene su propio render.
// Antes esta función mostraba siempre el grid de Verbos sin
// importar la unidad — quedó corregido acá.
function renderMesaFija(mesa) {
  mesa.innerHTML = '';
  if (estado.unidad === 'G') {
    renderMesaFijaVerbos(mesa);
  } else if (estado.unidad === 'B' && estado.tema === 'B3') {
    renderTarjetaPaisItalia(mesa);
  } else {
    renderMesaFijaGenerica(mesa);
  }
}

    card.style.boxShadow = `0 0 2px 0 ${hexToRgba(t.color1, 0.55)}, 0 0 7px 1px ${hexToRgba(t.color1, 0.22)}`;

        return `<tr><td class="persona">${fila.p}</td><td class="hablar" data-hablar="${frase}" style="color:${t.color1}; white-space:nowrap;">${fila.f}</td></tr>`;
      }).join('');
      card.innerHTML = `

        <div class="tarjeta-fija-subtitulo">${d.subtitulo}</div>

    } else {
      card.innerHTML = `

          contenido
        </div>`;
    }
    grid.appendChild(card);
  });

  mesa.appendChild(grid);

  // Empareja el alto dentro de cada fila (las 4 de arriba entre sí, las 4
  // de abajo entre sí) midiendo el alto real ya pintado — más confiable
  // que depender solo de CSS grid, que puede no recalcular bien cuando
  // el contenido crece (más personas, notas más largas, etc.)
  const tarjetas = Array.from(grid.children);
  tarjetas.forEach(c => c.style.height = 'auto');
  const filaArriba = tarjetas.slice(0, 4);
  const filaAbajo  = tarjetas.slice(4, 8);
  [filaArriba, filaAbajo].forEach(fila => {
    if (fila.length === 0) return;
    const maxAlto = Math.max(...fila.map(c => c.offsetHeight));
    fila.forEach(c => c.style.height = maxAlto + 'px');
  });
}

// Mesa libre: tarjetas arrastrables, aparecen en esquina sup izq
const ESQUINA = 20; // separación desde el borde de la mesa al aparecer por primera vez

function renderMesaLibre(mesa) {
  const clave = claveNivelActual();
  const disponibles = CONTENIDO_TARJETAS[clave] || [];
  const sacadas = estado.sacadas[clave] || [];

  mesa.innerHTML = '';

  if (sacadas.length === 0) {
    mesa.innerHTML = '<div class="mesa-vacia" style="opacity:0.4">Mesa lista — abrí la caja de tarjetas para sacar contenido</div>';
    return;
  }

  const rectMesa = mesa.getBoundingClientRect();

  sacadas.forEach((id, i) => {
    const def = disponibles.find(t => t.id === id);
    if (!def) return;
    const card = def.render();
    card.style.position = 'absolute';
    card.style.zIndex = 10 + i;

    let pos = estado.tarjetas[id];
    if (!pos) pos = { left: ESQUINA, top: ESQUINA };

    // Se posiciona, se mide y se recorta contra los límites reales de la mesa
    card.style.left = pos.left + 'px';
    card.style.top  = pos.top  + 'px';
    mesa.appendChild(card);

    const rectCard = card.getBoundingClientRect();
    const maxX = Math.max(0, rectMesa.width  - rectCard.width);
    const maxY = Math.max(0, rectMesa.height - rectCard.height);
    const nx = Math.min(Math.max(0, pos.left), maxX);
    const ny = Math.min(Math.max(0, pos.top),  maxY);
    card.style.left = nx + 'px';
    card.style.top  = ny + 'px';

    activarArrastre(card, id);
  });
}

// ── Arrastre de tarjetas ──────────────────────────────────────────────
// Se aplica al título de cada tarjeta en mesa libre
function activarArrastre(tarjeta, id) {
  const titulo = tarjeta.querySelector('.tarjeta-titulo');
  if (!titulo) return;

  // Constantes de zoom
  const SCALE_MIN = 0.6;   // Mínimo 60% del tamaño original
  const SCALE_MAX = 1.0;   // Máximo 100% (tamaño original)
  let currentScale = 1.0;
  let initialDistance = 0;

  // ── Arrastre ──────────────────────────────────────────
  titulo.addEventListener('pointerdown', ev => {
    if (!estado.editor) return;
    ev.preventDefault();
    tarjeta.style.zIndex = 50;
    const mesa = document.getElementById('mesa');
    const rectMesa = mesa.getBoundingClientRect();
    const rectCard = tarjeta.getBoundingClientRect();

    const ox = ev.clientX - rectCard.left;
    const oy = ev.clientY - rectCard.top;
    const maxX = rectMesa.width  - rectCard.width;
    const maxY = rectMesa.height - rectCard.height;

    function mover(ev2) {
      const nx = Math.min(Math.max(0, ev2.clientX - rectMesa.left - ox), maxX);
      const ny = Math.min(Math.max(0, ev2.clientY - rectMesa.top  - oy), maxY);
      tarjeta.style.left = nx + 'px';
      tarjeta.style.top  = ny + 'px';
    }
    function soltar() {
      document.removeEventListener('pointermove', mover);
      document.removeEventListener('pointerup', soltar);
      estado.tarjetas[id] = {
        left: parseInt(tarjeta.style.left),
        top:  parseInt(tarjeta.style.top)
      };
    }

    document.addEventListener('pointermove', mover);
    document.addEventListener('pointerup', soltar);
  });

  // ── Pinch-to-zoom ─────────────────────────────────────
  tarjeta.addEventListener('touchstart', ev => {
    if (!estado.editor || ev.touches.length !== 2) return;
    ev.preventDefault();
    
    const touch1 = ev.touches[0];
    const touch2 = ev.touches[1];
    initialDistance = Math.hypot(
      touch2.clientX - touch1.clientX,
      touch2.clientY - touch1.clientY
    );
  }, false);

  tarjeta.addEventListener('touchmove', ev => {
    if (!estado.editor || ev.touches.length !== 2 || initialDistance === 0) return;
    ev.preventDefault();
    
    const touch1 = ev.touches[0];
    const touch2 = ev.touches[1];
    const currentDistance = Math.hypot(
      touch2.clientX - touch1.clientX,
      touch2.clientY - touch1.clientY
    );
    
    const scale = currentDistance / initialDistance;
    let newScale = currentScale * scale;
    newScale = Math.min(Math.max(newScale, SCALE_MIN), SCALE_MAX);
    
    tarjeta.style.transform = `scale(${newScale})`;
    currentScale = newScale;
    initialDistance = currentDistance;
  }, false);

  tarjeta.addEventListener('touchend', ev => {
    if (ev.touches.length < 2) {
      initialDistance = 0;
    }
  }, false);
}
